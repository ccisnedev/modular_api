name: modular_api
description: Use-case centric API toolkit for Dart — Shelf UseCase base class, HTTP adapters, CORS middleware, and automatic OpenAPI documentation.
version: 0.5.0

repository: https://github.com/macss-dev/modular_api/tree/main/code/dart/modular_api
homepage: https://github.com/macss-dev/modular_api
issue_tracker: https://github.com/macss-dev/modular_api/issues
documentation: https://pub.dev/documentation/modular_api/latest

environment:
  sdk: ">=3.3.0 <4.0.0"
  
dependencies:
  crypto: ^3.0.6
  gql: ^1.0.1
  json5: ^0.8.2
  leto: 0.0.1-dev.2
  leto_schema: 0.0.1-dev.6
  leto_shelf: 0.0.1-dev.2
  shelf: ^1.4.2
  shelf_router: ^1.1.4

dev_dependencies:
  http: ^1.6.0
  lints: ^5.0.0
  test: ^1.28.0

topics:
  - api
  - openapi
  - macss
